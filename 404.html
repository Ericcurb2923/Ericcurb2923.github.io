<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Curb</title>
    <script type="text/javascript">
      // Redirekcija nazad na index.html sa sačuvanom putanjom
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/?p=' + l.pathname.replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
